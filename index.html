<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {

    animation:fadeIn 1.1s ease-out forwards;

    font-weight:600;
    margin-bottom:14px;
    opacity:0;
    animation:fadeIn 1.1s ease-out 0.2s forwards;

    font-size:42px;
    color:#2A1F14;
    letter-spacing:1px;
    margin-bottom:10px;
    opacity:0;
    animation:fadeIn 1.1s ease-out 0.35s forwards;
  }
  p {
    font-size:13px;
    color:#8A7E72;
    letter-spacing:0.5px;
    opacity:0;
    animation:fadeIn 1.1s ease-out 0.5s forwards;
  }
  .rule {
    width:48px;
    height:1px;
    background:#C2A46E;
    margin:22px auto;
    opacity:0;
    animation:fadeIn 1.1s ease-out 0.45s forwards;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }
